<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="calculator.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <main>
        <section id="calculator-container">
            <div id="display-container"></div>
            <div id="interface">
                <div class="button-container" id="functions">
                    <button class="func-button" id="ac">AC</button>
                    <button class="func-button" id="ce">CE</button>
                </div>
                <div class="button-container" id="numpad">
                    <button class="num-button" id="7" >7</button>
                    <button class="num-button" id="8" >8</button>
                    <button class="num-button" id="9" >9</button>

                    <button class="num-button" id="4" >4</button>
                    <button class="num-button" id="5" >5</button>
                    <button class="num-button" id="6" >6</button>

                    <button class="num-button" id="1" >1</button>
                    <button class="num-button" id="2" >2</button>
                    <button class="num-button" id="3" >3</button>

                    <button class="num-button" id="0" >0</button>
                    <button class="symbol-button" id="decimal">.</button>
                    <button class="op-button" id="equals">=</button>
                </div>
                <div class="button-container" id="operations">
                    <button class="op-button" id="divide" >÷</button>
                    <button class="op-button" id="multiply"  >×</button>
                    <button class="op-button" id="subtract" >-</button>
                    <button class="op-button" id="add" >+</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
